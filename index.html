<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- 모바일 및 다양한 기기 화면에서 반응형 레이아웃이 올바르게 렌더링되도록 뷰포트를 설정합니다. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- 네이버/구글 검색엔진 최적화(SEO)를 위한 핵심 키워드 및 메타 정보 설정입니다. -->
    <!-- 자주 검색되는 '이유식', '이유식 추천' 등의 단어가 자연스럽게 검색 봇에 노출되도록 타이틀을 세팅합니다. -->
    <title>베베레시피 | 맞춤형 아기 이유식 추천 및 시기별 이유식 레시피 가이드</title>
    
    <!-- 검색 결과 스니펫에 노출되는 매력적이고 키워드가 포함된 웹사이트 설명입니다. (이유식 추천, 초기/중기/후기 레시피 등 유입 키워드 녹임) -->
    <meta name="description" content="우리 아기를 위한 맞춤형 이유식 추천 및 단계별 이유식 레시피 가이드 플랫폼 베베레시피! 초기/중기/후기/완료기 이유식 식단 정보와 솔직한 요리 후기를 제공합니다." />
    
    <!-- 검색 봇이 수집할 수 있도록 자주 쓰이는 이유식 검색 키워드 태그들을 정의합니다. -->
    <meta name="keywords" content="이유식, 이유식 추천, 아기 이유식 추천, 이유식 레시피, 초기 이유식, 중기 이유식, 후기 이유식, 완료기 이유식, 아기 이유식 가이드, 베베레시피" />
    
    <!-- 대표(표준) URL을 설정하여 중복 콘텐츠로 인한 검색 페널티를 방지하고 신뢰도를 높입니다. -->
    <link rel="canonical" href="https://beberecipe.com" />
    
    <!-- 네이버 블로그, 카카오톡, 페이스북 등 소셜 공유(SNS) 및 웹 크롤링 시 상단 노출 최적화를 위한 오픈그래프(Open Graph) 메타 태그 설정입니다. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="베베레시피 | 맞춤형 아기 이유식 추천 및 레시피 가이드" />
    <meta property="og:description" content="우리 아기 맞춤형 이유식 추천부터 단계별 이유식 레시피 정보, 부모들의 솔직한 후기까지 베베레시피에서 확인해보세요." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://beberecipe.com" />
    <meta property="og:site_name" content="베베레시피" />
    
    <!-- 웹 폰트를 로드합니다. 한글 가독성을 위한 Noto Sans KR과 프리미엄 감성의 세련된 숫자/헤딩용 Outfit 폰트를 사용합니다. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- React 애플리케이션이 마운트될 루트 엘리먼트입니다. 고유 아이디를 제공하여 DOM 탐색 및 테스트에 용이하게 합니다. -->
    <div id="root"></div>
    
    <!-- React 소스 코드가 포함된 엔트리 포인트인 main.jsx 파일을 로드합니다. -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
