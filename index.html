<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- 모바일 및 다양한 기기 화면에서 반응형 레이아웃이 올바르게 렌더링되도록 뷰포트를 설정합니다. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- 검색 엔진 최적화(SEO)를 위해 사이트 설명 메타 태그를 정의합니다. -->
    <meta name="description" content="아기 생일 기준 맞춤형 이유식 단계 추천, 초기/중기/후기 이유식 메뉴 및 상세 조리 레시피를 제공하는 깔끔하고 직관적인 이유식 가이드 웹사이트입니다." />
    
    <title>베베레시피 - 맞춤형 아기 이유식 가이드</title>
    
    <!-- 웹 폰트를 로드합니다. 한글 가독성을 위한 Noto Sans KR과 프리미엄 감성의 세련된 숫자/헤딩용 Outfit 폰트를 사용합니다. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- React 애플리케이션이 마운트될 루트 엘리먼트입니다. 고유 아이디를 제공하여 DOM 탐색 및 테스트에 용이하게 합니다. -->
    <div id="root"></div>
    
    <!-- React 소스 코드가 포함된 엔트리 포인트인 main.jsx 파일을 로드합니다. -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
